<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#378ADD">
  <meta name="description" content="Balance your squad with smart team generation">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Team Builder">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23378ADD' width='192' height='192'/><text x='96' y='120' font-size='80' font-weight='bold' text-anchor='middle' fill='white'>⚽</text></svg>">
  <title>Team Builder</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
    }
    :root {
      --surface-0: #f5f5f5;
      --surface-1: #ffffff;
      --surface-2: #ffffff;
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --text-muted: #999999;
      --text-accent: #378ADD;
      --fill-accent: #378ADD;
      --on-accent: #ffffff;
      --border: rgba(0, 0, 0, 0.08);
      --border-strong: rgba(0, 0, 0, 0.12);
      --radius: 8px;
    }
    @media (prefers-color-scheme: dark) {
      html, body {
        background: #1a1a1a;
        color: #f5f5f5;
      }
      :root {
        --surface-0: #1a1a1a;
        --surface-1: #2a2a2a;
        --surface-2: #2a2a2a;
        --text-primary: #f5f5f5;
        --text-secondary: #999999;
        --text-muted: #666666;
        --border: rgba(255, 255, 255, 0.12);
        --border-strong: rgba(255, 255, 255, 0.2);
      }
    }
  </style>
</head>
<body>
<div style="display: flex; flex-direction: column; min-height: 100vh; background: var(--surface-0); padding: 0;">
  <!-- Header -->
  <div style="background: var(--surface-1); border-bottom: 0.5px solid var(--border); padding: 1rem; text-align: center;">
    <h1 style="font-size: 22px; font-weight: 500; margin: 0; color: var(--text-primary);">Team Builder</h1>
    <p style="font-size: 13px; color: var(--text-secondary); margin: 4px 0 0;">Balance your squad</p>
  </div>

  <!-- Content -->
  <div style="flex: 1; overflow-y: auto; padding: 1rem;">
    
    <!-- Tab Navigation -->
    <div style="display: flex; gap: 8px; margin-bottom: 1.5rem; border-bottom: 0.5px solid var(--border); padding-bottom: 12px;">
      <button id="tab-input" style="flex: 1; padding: 8px; background: var(--surface-1); border: 0.5px solid var(--border-strong); border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; color: var(--text-accent); border-bottom: 2px solid var(--fill-accent);" onclick="switchTab('input')">Add Players</button>
      <button id="tab-teams" style="flex: 1; padding: 8px; background: transparent; border: none; font-size: 14px; font-weight: 500; cursor: pointer; color: var(--text-secondary);" onclick="switchTab('teams')">Teams</button>
    </div>

    <!-- Input Section -->
    <div id="section-input" style="display: block;">
      <div style="margin-bottom: 1.5rem;">
        <label style="display: block; font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 8px;">Player name</label>
        <input id="playerName" type="text" placeholder="e.g. Ahmed" style="width: 100%; padding: 10px; border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 14px; box-sizing: border-box; background: var(--surface-2); color: var(--text-primary);">
      </div>

      <div style="margin-bottom: 1.5rem;">
        <label style="display: block; font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 10px;">Positions</label>
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
          <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px;">
            <input type="checkbox" id="pos-gk" style="cursor: pointer; width: 18px; height: 18px;">
            <span>GK</span>
          </label>
          <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px;">
            <input type="checkbox" id="pos-cb" style="cursor: pointer; width: 18px; height: 18px;">
            <span>CB</span>
          </label>
          <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px;">
            <input type="checkbox" id="pos-lb" style="cursor: pointer; width: 18px; height: 18px;">
            <span>LB</span>
          </label>
          <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px;">
            <input type="checkbox" id="pos-rb" style="cursor: pointer; width: 18px; height: 18px;">
            <span>RB</span>
          </label>
          <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px;">
            <input type="checkbox" id="pos-cdm" style="cursor: pointer; width: 18px; height: 18px;">
            <span>CDM</span>
          </label>
          <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px;">
            <input type="checkbox" id="pos-cm" style="cursor: pointer; width: 18px; height: 18px;">
            <span>CM</span>
          </label>
          <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px;">
            <input type="checkbox" id="pos-cam" style="cursor: pointer; width: 18px; height: 18px;">
            <span>CAM</span>
          </label>
          <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px;">
            <input type="checkbox" id="pos-lw" style="cursor: pointer; width: 18px; height: 18px;">
            <span>LW</span>
          </label>
          <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px;">
            <input type="checkbox" id="pos-rw" style="cursor: pointer; width: 18px; height: 18px;">
            <span>RW</span>
          </label>
          <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px;">
            <input type="checkbox" id="pos-st" style="cursor: pointer; width: 18px; height: 18px;">
            <span>ST</span>
          </label>
          <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px;">
            <input type="checkbox" id="pos-fw" style="cursor: pointer; width: 18px; height: 18px;">
            <span>FW</span>
          </label>
          <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px;">
            <input type="checkbox" id="pos-cf" style="cursor: pointer; width: 18px; height: 18px;">
            <span>CF</span>
          </label>
        </div>
      </div>

      <div style="margin-bottom: 1.5rem;">
        <label style="display: block; font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 8px;">Rating <span style="color: var(--text-secondary); font-weight: 400;">1.0–10.0</span></label>
        <input id="playerRating" type="number" min="1" max="10" step="0.5" placeholder="7.5" style="width: 100%; padding: 10px; border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 14px; box-sizing: border-box; background: var(--surface-2); color: var(--text-primary);">
      </div>

      <button onclick="addPlayer()" style="width: 100%; padding: 12px; background: var(--fill-accent); color: var(--on-accent); border: none; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer;">Add player</button>

      <div id="playersList" style="margin-top: 1.5rem;">
        <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 12px;" id="playerCount">0 players</p>
        <div id="playersContainer" style="display: flex; flex-direction: column; gap: 8px;"></div>
      </div>
    </div>

    <!-- Teams Section -->
    <div id="section-teams" style="display: none;">
      <div style="margin-bottom: 1.5rem;">
        <label style="display: block; font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 8px;">Team sizes <span style="color: var(--text-secondary); font-weight: 400;">separated by dashes</span></label>
        <input id="teamSizes" type="text" placeholder="3-3-4" style="width: 100%; padding: 10px; border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 14px; box-sizing: border-box; background: var(--surface-2); color: var(--text-primary);">
        <p style="font-size: 13px; color: var(--text-secondary); margin-top: 8px;" id="playerCountNote">Must match your player count</p>
      </div>

      <button onclick="generateTeams()" style="width: 100%; padding: 12px; background: var(--fill-accent); color: var(--on-accent); border: none; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; margin-bottom: 1.5rem;">Generate balanced teams</button>

      <div id="resultsContainer"></div>
    </div>
  </div>
</div>

<!-- Edit Player Modal -->
<div id="editModalOverlay" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 1rem;">
  <div style="background: var(--surface-1); border-radius: 12px; padding: 1.5rem; width: 100%; max-width: 400px; max-height: 90vh; overflow-y: auto;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
      <h2 style="font-size: 18px; font-weight: 500; margin: 0;">Edit player</h2>
      <button onclick="closeEditModal()" style="background: none; border: none; cursor: pointer; font-size: 24px; color: var(--text-secondary); padding: 0; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;">✕</button>
    </div>

    <input type="hidden" id="editPlayerIndex">

    <div style="margin-bottom: 1.5rem;">
      <label style="display: block; font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 8px;">Name</label>
      <input id="editPlayerName" type="text" style="width: 100%; padding: 10px; border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 14px; box-sizing: border-box; background: var(--surface-2); color: var(--text-primary);">
    </div>

    <div style="margin-bottom: 1.5rem;">
      <label style="display: block; font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 10px;">Positions</label>
      <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;">
        <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px;">
          <input type="checkbox" id="pos-gk" style="cursor: pointer; width: 18px; height: 18px;">
          <span>GK</span>
        </label>
        <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px;">
          <input type="checkbox" id="pos-cb" style="cursor: pointer; width: 18px; height: 18px;">
          <span>CB</span>
        </label>
        <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px;">
          <input type="checkbox" id="pos-lb" style="cursor: pointer; width: 18px; height: 18px;">
          <span>LB</span>
        </label>
        <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px;">
          <input type="checkbox" id="pos-rb" style="cursor: pointer; width: 18px; height: 18px;">
          <span>RB</span>
        </label>
        <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px;">
          <input type="checkbox" id="pos-cdm" style="cursor: pointer; width: 18px; height: 18px;">
          <span>CDM</span>
        </label>
        <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px;">
          <input type="checkbox" id="pos-cm" style="cursor: pointer; width: 18px; height: 18px;">
          <span>CM</span>
        </label>
        <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px;">
          <input type="checkbox" id="pos-cam" style="cursor: pointer; width: 18px; height: 18px;">
          <span>CAM</span>
        </label>
        <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px;">
          <input type="checkbox" id="pos-lw" style="cursor: pointer; width: 18px; height: 18px;">
          <span>LW</span>
        </label>
        <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px;">
          <input type="checkbox" id="pos-rw" style="cursor: pointer; width: 18px; height: 18px;">
          <span>RW</span>
        </label>
        <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px;">
          <input type="checkbox" id="pos-st" style="cursor: pointer; width: 18px; height: 18px;">
          <span>ST</span>
        </label>
        <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px;">
          <input type="checkbox" id="pos-fw" style="cursor: pointer; width: 18px; height: 18px;">
          <span>FW</span>
        </label>
        <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px;">
          <input type="checkbox" id="pos-cf" style="cursor: pointer; width: 18px; height: 18px;">
          <span>CF</span>
        </label>
      </div>
    </div>

    <div style="margin-bottom: 1.5rem;">
      <label style="display: block; font-size: 14px; font-weight: 500; color: var(--text-primary); margin-bottom: 8px;">Rating</label>
      <input id="editPlayerRating" type="number" min="1" max="10" step="0.5" style="width: 100%; padding: 10px; border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 14px; box-sizing: border-box; background: var(--surface-2); color: var(--text-primary);">
    </div>

    <div style="display: flex; gap: 8px;">
      <button onclick="savePlayerEdit()" style="flex: 1; padding: 12px; background: var(--fill-accent); color: var(--on-accent); border: none; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer;">Save</button>
      <button onclick="closeEditModal()" style="flex: 1; padding: 12px; background: var(--surface-0); color: var(--text-primary); border: 0.5px solid var(--border); border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer;">Cancel</button>
    </div>
  </div>
</div>

<script>
let players = [];
const POSITIONS = ['GK', 'CB', 'LB', 'RB', 'CDM', 'CM', 'CAM', 'LW', 'RW', 'ST', 'FW', 'CF'];
const STORAGE_KEY = 'teambuilder_players';

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js').catch(() => {});
}

function saveToStorage() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(players));
}

function loadFromStorage() {
  const stored = localStorage.getItem(STORAGE_KEY);
  if (stored) {
    players = JSON.parse(stored);
    renderPlayers();
  }
}

function getSelectedPositions() {
  const selected = [];
  for (const pos of POSITIONS) {
    if (document.getElementById(`pos-${pos.toLowerCase()}`).checked) {
      selected.push(pos);
    }
  }
  return selected;
}

function clearPositionCheckboxes() {
  for (const pos of POSITIONS) {
    document.getElementById(`pos-${pos.toLowerCase()}`).checked = false;
  }
}

function switchTab(tab) {
  document.getElementById('section-input').style.display = tab === 'input' ? 'block' : 'none';
  document.getElementById('section-teams').style.display = tab === 'teams' ? 'block' : 'none';
  
  document.getElementById('tab-input').style.cssText = tab === 'input' ? 'flex: 1; padding: 8px; background: var(--surface-1); border: 0.5px solid var(--border-strong); border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; color: var(--text-accent); border-bottom: 2px solid var(--fill-accent);' : 'flex: 1; padding: 8px; background: transparent; border: none; font-size: 14px; font-weight: 500; cursor: pointer; color: var(--text-secondary);';
  
  document.getElementById('tab-teams').style.cssText = tab === 'teams' ? 'flex: 1; padding: 8px; background: var(--surface-1); border: 0.5px solid var(--border-strong); border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; color: var(--text-accent); border-bottom: 2px solid var(--fill-accent);' : 'flex: 1; padding: 8px; background: transparent; border: none; font-size: 14px; font-weight: 500; cursor: pointer; color: var(--text-secondary);';
  
  if (tab === 'teams') {
    updatePlayerCountNote();
  }
}

function updatePlayerCountNote() {
  const active = players.filter(p => p.active).length;
  document.getElementById('playerCountNote').textContent = `Must match active player count (${active})`;
}

function addPlayer() {
  const name = document.getElementById('playerName').value.trim();
  const positions = getSelectedPositions();
  const ratingInput = document.getElementById('playerRating').value.trim();
  const rating = ratingInput ? parseFloat(ratingInput) : null;

  if (!name) {
    alert('Enter player name');
    return;
  }
  if (positions.length === 0) {
    alert('Select at least one position');
    return;
  }
  if (!rating || isNaN(rating)) {
    alert('Enter a valid rating');
    return;
  }
  if (rating < 1 || rating > 10) {
    alert('Rating must be between 1.0 and 10.0');
    return;
  }

  players.push({ name, positions: positions.join(';'), rating: Math.round(rating * 10), active: true });
  saveToStorage();
  
  document.getElementById('playerName').value = '';
  clearPositionCheckboxes();
  document.getElementById('playerRating').value = '';
  document.getElementById('playerName').focus();
  
  renderPlayers();
}

function togglePlayer(index) {
  players[index].active = !players[index].active;
  saveToStorage();
  renderPlayers();
}

function removePlayer(index) {
  players.splice(index, 1);
  saveToStorage();
  renderPlayers();
}

function renderPlayers() {
  const active = players.filter(p => p.active).length;
  document.getElementById('playerCount').textContent = `${active} of ${players.length} player${players.length !== 1 ? 's' : ''} active`;
  
  const container = document.getElementById('playersContainer');
  container.innerHTML = players.map((p, i) => `
    <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px; background: var(--surface-1); border-radius: var(--radius); border: 0.5px solid var(--border); opacity: ${p.active ? '1' : '0.5'}; transition: opacity 0.2s;">
      <div style="flex: 1; cursor: pointer;" onclick="editPlayer(${i})">
        <p style="font-weight: 500; font-size: 14px; margin: 0; color: var(--text-primary);">${p.name}</p>
        <p style="font-size: 12px; color: var(--text-secondary); margin: 2px 0 0;">⭐ ${(p.rating / 10).toFixed(1)} • ${p.positions}</p>
      </div>
      <div style="display: flex; gap: 6px;">
        <button onclick="editPlayer(${i})" style="background: none; border: none; cursor: pointer; color: var(--text-secondary); font-size: 16px; padding: 6px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: var(--radius);" title="Edit">
          ✏️
        </button>
        <button onclick="togglePlayer(${i})" style="background: none; border: none; cursor: pointer; color: var(--text-secondary); font-size: 16px; padding: 6px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: var(--radius);" title="${p.active ? 'Hide' : 'Show'}">
          ${p.active ? '👁️' : '👁️‍🗨️'}
        </button>
        <button onclick="removePlayer(${i})" style="background: none; border: none; cursor: pointer; color: var(--text-secondary); font-size: 16px; padding: 6px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: var(--radius);" title="Delete">
          🗑️
        </button>
      </div>
    </div>
  `).join('');
}

function generateTeams() {
  const active = players.filter(p => p.active);
  
  if (active.length === 0) {
    alert('Add and enable players first');
    return;
  }

  const sizesStr = document.getElementById('teamSizes').value.trim();
  if (!sizesStr) {
    alert('Enter team sizes (e.g., 3-3-4)');
    return;
  }

  const sizes = sizesStr.split('-').map(s => parseInt(s.trim()));
  const totalSlots = sizes.reduce((a, b) => a + b, 0);

  if (totalSlots !== active.length) {
    alert(`Team sizes must total ${active.length} players`);
    return;
  }

  const teams = balanceTeams(active, sizes);
  renderTeams(teams, sizes);
}

function balanceTeams(playerList, teamSizes) {
  const numTeams = teamSizes.length;
  const teams = Array.from({ length: numTeams }, () => []);
  
  const sorted = [...playerList].sort((a, b) => b.rating - a.rating);
  
  let teamIndex = 0;
  let direction = 1;
  
  for (const player of sorted) {
    let attempts = 0;
    while (teams[teamIndex].length >= teamSizes[teamIndex] && attempts < numTeams) {
      teamIndex = (teamIndex + direction + numTeams) % numTeams;
      attempts++;
    }
    
    if (attempts < numTeams) {
      teams[teamIndex].push(player);
      if (teams[teamIndex].length >= teamSizes[teamIndex]) {
        teamIndex = (teamIndex + direction + numTeams) % numTeams;
      }
    }
  }
  
  return teams;
}

function renderTeams(teams, sizes) {
  const results = teams.map((team, i) => {
    const strength = team.reduce((sum, p) => sum + p.rating, 0);
    const avg = (strength / team.length).toFixed(1);
    return { team, i, strength, avg };
  });

  const minStr = Math.min(...results.map(r => r.strength));
  const maxStr = Math.max(...results.map(r => r.strength));
  const disparity = maxStr - minStr;

  const html = `
    <div style="margin-bottom: 1rem;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
        <h2 style="font-size: 16px; font-weight: 500; margin: 0;">Results</h2>
        <span style="font-size: 13px; color: var(--text-secondary);">Disparity: ${disparity}</span>
      </div>
    </div>
    ${results.map(r => `
      <div style="background: var(--surface-1); border: 0.5px solid var(--border); border-radius: 12px; padding: 1rem; margin-bottom: 12px;">
        <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px;">
          <h3 style="font-size: 16px; font-weight: 500; margin: 0;">Team ${r.i + 1}</h3>
          <span style="font-size: 13px; color: var(--text-secondary);">⭐ ${r.avg} avg</span>
        </div>
        <div style="font-size: 20px; font-weight: 500; color: var(--text-accent); margin-bottom: 12px;">${r.strength}</div>
        <div style="display: flex; flex-direction: column; gap: 6px;">
          ${r.team.map(p => `
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 8px; background: var(--surface-0); border-radius: var(--radius); font-size: 14px;">
              <span style="color: var(--text-primary);">${p.name}</span>
              <span style="color: var(--text-secondary); font-size: 12px;">${(p.rating / 10).toFixed(1)}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('')}
  `;

  document.getElementById('resultsContainer').innerHTML = html;
}

function editPlayer(index) {
  const player = players[index];
  
  document.getElementById('editPlayerName').value = player.name;
  document.getElementById('editPlayerRating').value = (player.rating / 10).toFixed(1);
  
  clearPositionCheckboxes();
  for (const pos of player.positions.split(';')) {
    const checkbox = document.getElementById(`pos-${pos.toLowerCase()}`);
    if (checkbox) checkbox.checked = true;
  }
  
  document.getElementById('editModalOverlay').style.display = 'flex';
  document.getElementById('editPlayerIndex').value = index;
  document.getElementById('editPlayerName').focus();
}

function closeEditModal() {
  document.getElementById('editModalOverlay').style.display = 'none';
}

function savePlayerEdit() {
  const index = parseInt(document.getElementById('editPlayerIndex').value);
  const name = document.getElementById('editPlayerName').value.trim();
  const positions = getSelectedPositions();
  const ratingInput = document.getElementById('editPlayerRating').value.trim();
  const rating = ratingInput ? parseFloat(ratingInput) : null;

  if (!name) {
    alert('Enter player name');
    return;
  }
  if (positions.length === 0) {
    alert('Select at least one position');
    return;
  }
  if (!rating || isNaN(rating)) {
    alert('Enter a valid rating');
    return;
  }
  if (rating < 1 || rating > 10) {
    alert('Rating must be between 1.0 and 10.0');
    return;
  }

  players[index] = { ...players[index], name, positions: positions.join(';'), rating: Math.round(rating * 10) };
  saveToStorage();
  closeEditModal();
  renderPlayers();
}

loadFromStorage();
</script>
</body>
</html>
